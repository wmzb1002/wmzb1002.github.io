<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对称式加密工具 - SymCrypt</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js">
    </script>
    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #4f6ef7;
            --primary-hover: #3b54d4;
            --primary-light: #eef1fd;
            --accent-encrypt: #4f6ef7;
            --accent-encrypt-hover: #3b54d4;
            --accent-decrypt: #f59e0b;
            --accent-decrypt-hover: #d97706;
            --accent-decrypt-light: #fffbeb;
            --text: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --border-focus: #4f6ef7;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.07), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 40px -8px rgba(0, 0, 0, 0.1), 0 8px 16px -8px rgba(0, 0, 0, 0.06);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
            --danger: #ef4444;
            --danger-light: #fef2f2;
            --warning: #f59e0b;
            --warning-light: #fffbeb;
            --success: #10b981;
            --success-light: #ecfdf5;
            --info: #3b82f6;
            --info-light: #eff6ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 20%, #e8ecfa 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, #e0e7ff 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, #f1f5f9 0%, transparent 70%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100%;
            max-width: 820px;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .header .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #4f6ef7 0%, #6366f1 50%, #7c3aed 100%);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            box-shadow: 0 8px 20px -6px rgba(79, 110, 247, 0.4);
        }
        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
            margin: 0;
        }
        .header .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        /* 主卡片 */
        .main-card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 28px 30px 24px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            transition: box-shadow var(--transition-slow);
        }
        .main-card:hover {
            box-shadow: var(--shadow-xl);
        }

        /* 模式切换标签 */
        .mode-tabs {
            display: flex;
            gap: 4px;
            background: #f1f5f9;
            border-radius: var(--radius);
            padding: 4px;
            margin-bottom: 24px;
            position: relative;
        }
        .mode-tab {
            flex: 1;
            padding: 10px 20px;
            border: none;
            background: transparent;
            border-radius: calc(var(--radius) - 4px);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all var(--transition);
            position: relative;
            z-index: 1;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }
        .mode-tab.active {
            color: #fff;
            background: var(--primary);
            box-shadow: 0 2px 8px rgba(79, 110, 247, 0.3);
        }
        .mode-tab:hover:not(.active) {
            color: var(--text);
            background: rgba(0, 0, 0, 0.04);
        }
        .mode-tab .tab-icon {
            margin-right: 6px;
            display: inline-block;
        }

        /* 输入输出区域 */
        .io-section {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 640px) {
            .io-section {
                flex-direction: column;
                gap: 16px;
            }
            .main-card {
                padding: 18px 16px 16px;
                border-radius: var(--radius-lg);
            }
            .header h1 {
                font-size: 1.4rem;
            }
            .header .logo-icon {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }
            .mode-tab {
                padding: 8px 12px;
                font-size: 0.82rem;
            }
            .settings-row {
                flex-direction: column;
                gap: 10px;
            }
            .btn-group {
                flex-wrap: wrap;
            }
            .btn {
                font-size: 0.85rem;
                padding: 10px 16px;
            }
        }

        .io-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .io-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .io-label .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-input {
            background: #4f6ef7;
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.2);
        }
        .dot-output {
            background: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
        .io-textarea {
            width: 100%;
            min-height: 150px;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            line-height: 1.6;
            resize: vertical;
            transition: all var(--transition);
            background: #fafbfc;
            color: var(--text);
        }
        .io-textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px rgba(79, 110, 247, 0.08);
            background: #fff;
        }
        .io-textarea.output-area {
            background: #f8fafb;
            cursor: default;
            color: #334155;
        }
        .io-textarea.output-area:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.07);
            background: #fff;
        }
        .io-textarea::placeholder {
            color: #c0c8d4;
            font-style: italic;
        }

        /* 箭头 */
        .arrow-between {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding-top: 28px;
        }
        .arrow-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--text-muted);
            transition: all var(--transition);
        }
        @media (max-width: 640px) {
            .arrow-between {
                padding-top: 0;
                transform: rotate(90deg);
            }
        }

        /* 设置行 */
        .settings-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 110px;
        }
        .setting-group label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }
        .setting-group select,
        .setting-group input {
            padding: 9px 12px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            font-family: inherit;
            background: #fafbfc;
            color: var(--text);
            transition: all var(--transition);
            cursor: pointer;
            min-width: 100px;
        }
        .setting-group select:focus,
        .setting-group input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.07);
            background: #fff;
        }
        .setting-group input {
            cursor: text;
            font-family: var(--font-mono);
            font-size: 0.82rem;
            letter-spacing: 0.02em;
        }
        .key-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .key-input-wrapper input {
            flex: 1;
            padding-right: 40px;
        }
        .key-toggle {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 8px;
            color: var(--text-muted);
            font-size: 1rem;
            border-radius: 6px;
            transition: all var(--transition);
            z-index: 2;
            line-height: 1;
        }
        .key-toggle:hover {
            color: var(--text);
            background: rgba(0, 0, 0, 0.05);
        }

        /* 按钮 */
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-encrypt {
            background: var(--accent-encrypt);
            color: #fff;
            box-shadow: 0 4px 14px rgba(79, 110, 247, 0.35);
            flex: 1;
            min-width: 120px;
            justify-content: center;
        }
        .btn-encrypt:hover {
            background: var(--accent-encrypt-hover);
            box-shadow: 0 6px 20px rgba(79, 110, 247, 0.45);
            transform: translateY(-1px);
        }
        .btn-decrypt {
            background: #fff;
            color: var(--accent-decrypt);
            border: 2px solid var(--accent-decrypt);
            flex: 1;
            min-width: 120px;
            justify-content: center;
        }
        .btn-decrypt:hover {
            background: var(--accent-decrypt-light);
            border-color: var(--accent-decrypt-hover);
            color: var(--accent-decrypt-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.2);
        }
        .btn-copy {
            background: #fff;
            color: var(--text-secondary);
            border: 2px solid var(--border);
            padding: 10px 16px;
            font-size: 0.82rem;
            gap: 5px;
        }
        .btn-copy:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            color: var(--text);
        }
        .btn-random-key {
            background: #fff;
            color: var(--info);
            border: 2px solid #e0e7ff;
            padding: 9px 14px;
            font-size: 0.78rem;
            gap: 4px;
            white-space: nowrap;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--transition);
            font-weight: 500;
        }
        .btn-random-key:hover {
            background: var(--info-light);
            border-color: #93c5fd;
        }
        .btn-swap {
            background: #fff;
            border: 2px solid var(--border);
            padding: 8px 12px;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--transition);
            color: var(--text-muted);
            line-height: 1;
        }
        .btn-swap:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            color: var(--text);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1e293b;
            color: #fff;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 1000;
            pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.02em;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            background: #059669;
        }
        .toast.error {
            background: #dc2626;
        }
        .toast.warning {
            background: #d97706;
        }

        /* 警告提示 */
        .warning-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 20px;
            background: var(--warning-light);
            color: #b45309;
            letter-spacing: 0.03em;
            animation: pulse-warning 2.5s ease-in-out infinite;
        }
        @keyframes pulse-warning {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.65;
            }
        }
        .warning-inline {
            margin-top: 4px;
            font-size: 0.72rem;
            color: #b45309;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
        }

        /* 底部信息 */
        .footer-info {
            text-align: center;
            margin-top: 18px;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }
        .footer-info span {
            opacity: 0.7;
        }
        .footer-info .dot-sep {
            margin: 0 8px;
            opacity: 0.4;
        }

        /* 密钥强度指示 */
        .key-strength {
            height: 3px;
            border-radius: 3px;
            margin-top: 4px;
            transition: all var(--transition);
            background: #e2e8f0;
            overflow: hidden;
        }
        .key-strength-bar {
            height: 100%;
            border-radius: 3px;
            transition: all 0.4s ease;
        }
        .strength-weak {
            width: 25%;
            background: #ef4444;
        }
        .strength-medium {
            width: 55%;
            background: #f59e0b;
        }
        .strength-strong {
            width: 80%;
            background: #10b981;
        }
        .strength-very-strong {
            width: 100%;
            background: #059669;
        }

        /* 平滑过渡 */
        .fade-switch {
            transition: opacity 0.2s ease;
        }
        .fade-switch.switching {
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🔐</div>
                <div>
                    <h1>SymCrypt</h1>
                    <p class="subtitle">在线对称式加密解密工具</p>
                </div>
            </div>
        </div>

        <!-- 主卡片 -->
        <div class="main-card" id="mainCard">
            <!-- 模式切换 -->
            <div class="mode-tabs" id="modeTabs">
                <button class="mode-tab active" data-mode="encrypt" id="tabEncrypt">
                    <span class="tab-icon">🔒</span> 加密模式
                </button>
                <button class="mode-tab" data-mode="decrypt" id="tabDecrypt">
                    <span class="tab-icon">🔓</span> 解密模式
                </button>
            </div>

            <!-- 输入输出区域 -->
            <div class="io-section" id="ioSection">
                <!-- 输入面板 -->
                <div class="io-panel" id="inputPanel">
                    <div class="io-label">
                        <span class="dot dot-input"></span>
                        <span id="inputLabel">明文</span>
                    </div>
                    <textarea
                    class="io-textarea"
                    id="inputText"
                    placeholder="在此输入待加密的明文内容..."
                    rows="5"
                ></textarea>
            </div>

            <!-- 箭头 -->
            <div class="arrow-between">
                <button class="btn-swap" id="btnSwap" title="交换输入输出内容">
                    ⇄
                </button>
            </div>

            <!-- 输出面板 -->
            <div class="io-panel" id="outputPanel">
                <div class="io-label">
                    <span class="dot dot-output"></span>
                    <span id="outputLabel">密文</span>
                    <button class="btn-copy" id="btnCopy" title="复制输出内容">
                        📋 复制
                    </button>
                </div>
                <textarea
                class="io-textarea output-area"
                id="outputText"
                placeholder="加密结果将显示在这里..."
                rows="5"
                readonly
            ></textarea>
        </div>
    </div>

    <!-- 设置区域 -->
    <div class="settings-row">
        <div class="setting-group" style="flex:1.5; min-width:140px;">
            <label>🔑 密钥 / 密码短语</label>
            <div class="key-input-wrapper">
                <input
                type="password"
                id="keyInput"
                placeholder="输入加密密钥..."
                autocomplete="off"
            />
            <button class="key-toggle" id="btnToggleKey" title="显示/隐藏密钥">
                👁️
            </button>
        </div>
        <div class="key-strength" id="keyStrength">
            <div class="key-strength-bar" id="keyStrengthBar"></div>
        </div>
    </div>
    <div class="setting-group" style="flex:0 0 auto; min-width:90px; justify-content:flex-end; padding-top:2px;">
        <label>&nbsp;</label>
        <button class="btn-random-key" id="btnRandomKey" title="生成随机强密钥">
            🎲 随机密钥
        </button>
    </div>
    <div class="setting-group" style="flex:1; min-width:100px;">
        <label>算法</label>
        <select id="algorithmSelect">
            <option value="AES" selected>AES (推荐)</option>
            <option value="TripleDES">3DES (Triple DES)</option>
            <option value="DES">DES (不推荐)</option>
        </select>
    </div>
    <div class="setting-group" style="flex:1; min-width:100px;">
        <label>加密模式</label>
        <select id="modeSelect">
            <option value="CBC" selected>CBC (推荐)</option>
            <option value="CTR">CTR</option>
            <option value="CFB">CFB</option>
            <option value="OFB">OFB</option>
            <option value="ECB">ECB ⚠️</option>
        </select>
    </div>
    <div class="setting-group" style="flex:1; min-width:100px;">
        <label>密钥长度</label>
        <select id="keySizeSelect">
            <option value="256" selected>256 位</option>
            <option value="192">192 位</option>
            <option value="128">128 位</option>
        </select>
    </div>
    <div class="setting-group" style="flex:0.8; min-width:90px;">
        <label>输出格式</label>
        <select id="outputFormatSelect">
            <option value="base64" selected>Base64</option>
            <option value="hex">Hex</option>
        </select>
    </div>
</div>

<!-- ECB 警告 -->
<div id="ecbWarning" style="display:none;">
    <div class="warning-inline">
        ⚠️ <strong>ECB 模式不安全：</strong>相同的明文块会产生相同的密文块，可能泄露数据模式。仅建议用于学习目的。
    </div>
</div>
<div id="desWarning" style="display:none;">
    <div class="warning-inline">
        ⚠️ <strong>DES 已过时：</strong>56位密钥长度不足，已被暴力破解。强烈建议使用 AES。
    </div>
</div>

<!-- 按钮行 -->
<div class="btn-row">
    <button class="btn btn-encrypt" id="btnEncrypt">
        🔒 加密
    </button>
    <button class="btn btn-decrypt" id="btnDecrypt">
        🔓 解密
    </button>
    <button class="btn-copy" id="btnClearOutput" style="background:#fff;border:2px solid #e2e8f0;color:#94a3b8;">
        🗑️ 清空
    </button>
</div>
</div>

<!-- 底部 -->
<div class="footer-info">
    <span>数据仅在浏览器本地处理，不会上传到任何服务器</span>
    <span class="dot-sep">·</span>
    <span>使用 CryptoJS 库</span>
    <span class="dot-sep">·</span>
    <span>请使用强密码并妥善保管密钥</span>
</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
    (function() {
        // ============ DOM 引用 ============
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const keyInput = document.getElementById('keyInput');
        const algorithmSelect = document.getElementById('algorithmSelect');
        const modeSelect = document.getElementById('modeSelect');
        const keySizeSelect = document.getElementById('keySizeSelect');
        const outputFormatSelect = document.getElementById('outputFormatSelect');
        const btnEncrypt = document.getElementById('btnEncrypt');
        const btnDecrypt = document.getElementById('btnDecrypt');
        const btnCopy = document.getElementById('btnCopy');
        const btnClearOutput = document.getElementById('btnClearOutput');
        const btnSwap = document.getElementById('btnSwap');
        const btnToggleKey = document.getElementById('btnToggleKey');
        const btnRandomKey = document.getElementById('btnRandomKey');
        const inputLabel = document.getElementById('inputLabel');
        const outputLabel = document.getElementById('outputLabel');
        const tabEncrypt = document.getElementById('tabEncrypt');
        const tabDecrypt = document.getElementById('tabDecrypt');
        const ecbWarning = document.getElementById('ecbWarning');
        const desWarning = document.getElementById('desWarning');
        const keyStrengthBar = document.getElementById('keyStrengthBar');
        const toast = document.getElementById('toast');
        const ioSection = document.getElementById('ioSection');

        // ============ 状态 ============
        let currentMode = 'encrypt'; // 'encrypt' | 'decrypt'
        let toastTimer = null;

        // ============ 初始化 ============
        updateModeUI();
        updateWarnings();
        updateKeyStrength();

        // ============ 事件监听 ============
        tabEncrypt.addEventListener('click', () => setMode('encrypt'));
        tabDecrypt.addEventListener('click', () => setMode('decrypt'));
        btnEncrypt.addEventListener('click', performEncrypt);
        btnDecrypt.addEventListener('click', performDecrypt);
        btnCopy.addEventListener('click', copyOutput);
        btnClearOutput.addEventListener('click', clearAll);
        btnSwap.addEventListener('click', swapIO);
        btnToggleKey.addEventListener('click', toggleKeyVisibility);
        btnRandomKey.addEventListener('click', generateRandomKey);
        keyInput.addEventListener('input', updateKeyStrength);
        algorithmSelect.addEventListener('change', () => {
            updateKeySizeOptions();
            updateWarnings();
            updateKeyStrength();
        });
        modeSelect.addEventListener('change', updateWarnings);
        outputText.addEventListener('focus', () => outputText.select());

        // 双击输出框自动复制
        outputText.addEventListener('dblclick', () => {
            copyOutput();
        });

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                if (currentMode === 'encrypt') {
                    performEncrypt();
                } else {
                    performDecrypt();
                }
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'c' && document.activeElement === outputText) {
                // 允许默认复制行为，但也可以触发我们的复制反馈
                setTimeout(() => {
                    if (outputText.value && outputText.selectionStart !== outputText
                        .selectionEnd) {
                        // 用户选择了部分文本，使用默认行为
                    } else if (outputText.value && document.activeElement === outputText) {
                        showToast('已复制到剪贴板 📋', 'success');
                    }
                }, 100);
            }
        });

        // ============ 核心函数 ============
        function setMode(mode) {
            currentMode = mode;
            updateModeUI();
            // 可选：自动交换输入输出内容
            // 不自动交换，让用户手动交换
        }

        function updateModeUI() {
            if (currentMode === 'encrypt') {
                tabEncrypt.classList.add('active');
                tabDecrypt.classList.remove('active');
                inputLabel.textContent = '明文';
                outputLabel.textContent = '密文';
                inputText.placeholder = '在此输入待加密的明文内容...';
                outputText.placeholder = '加密结果将显示在这里...';
                btnEncrypt.style.display = 'inline-flex';
                btnDecrypt.style.display = 'inline-flex';
                document.querySelector('.dot-input').style.background = '#4f6ef7';
                document.querySelector('.dot-input').style.boxShadow = '0 0 0 3px rgba(79,110,247,0.2)';
            } else {
                tabDecrypt.classList.add('active');
                tabEncrypt.classList.remove('active');
                inputLabel.textContent = '密文';
                outputLabel.textContent = '明文';
                inputText.placeholder = '在此输入待解密的密文内容...';
                outputText.placeholder = '解密结果将显示在这里...';
                btnEncrypt.style.display = 'inline-flex';
                btnDecrypt.style.display = 'inline-flex';
                document.querySelector('.dot-input').style.background = '#f59e0b';
                document.querySelector('.dot-input').style.boxShadow = '0 0 0 3px rgba(245,158,11,0.2)';
            }
        }

        function getDerivedKey(password) {
            if (!password || password.length === 0) {
                return null;
            }
            const algorithm = algorithmSelect.value;
            const keySize = parseInt(keySizeSelect.value);
            const sha256Hash = CryptoJS.SHA256(password);

            let keyBytes;
            if (algorithm === 'AES') {
                keyBytes = keySize / 8; // 16, 24, or 32
            } else if (algorithm === 'TripleDES') {
                keyBytes = 24; // 3DES使用24字节
            } else if (algorithm === 'DES') {
                keyBytes = 8; // DES使用8字节
            } else {
                keyBytes = 32;
            }

            // 从SHA-256哈希中截取所需字节
            const hashHex = sha256Hash.toString(CryptoJS.enc.Hex);
            const truncatedHex = hashHex.substring(0, keyBytes * 2);
            return CryptoJS.enc.Hex.parse(truncatedHex);
        }

        function getIVByteLength() {
            const algorithm = algorithmSelect.value;
            if (algorithm === 'AES') return 16;
            if (algorithm === 'TripleDES' || algorithm === 'DES') return 8;
            return 16;
        }

        function getBlockByteLength() {
            const algorithm = algorithmSelect.value;
            if (algorithm === 'AES') return 16;
            if (algorithm === 'TripleDES' || algorithm === 'DES') return 8;
            return 16;
        }

        function getCryptoJSCipher(algorithm) {
            switch (algorithm) {
                case 'AES':
                    return CryptoJS.AES;
                case 'TripleDES':
                    return CryptoJS.TripleDES;
                case 'DES':
                    return CryptoJS.DES;
                default:
                    return CryptoJS.AES;
            }
        }

        function getCryptoJSMode(mode) {
            switch (mode) {
                case 'CBC':
                    return CryptoJS.mode.CBC;
                case 'ECB':
                    return CryptoJS.mode.ECB;
                case 'CTR':
                    return CryptoJS.mode.CTR;
                case 'CFB':
                    return CryptoJS.mode.CFB;
                case 'OFB':
                    return CryptoJS.mode.OFB;
                default:
                    return CryptoJS.mode.CBC;
            }
        }

        function performEncrypt() {
            const plaintext = inputText.value;
            const password = keyInput.value;

            if (!password) {
                showToast('请输入密钥 🔑', 'warning');
                keyInput.focus();
                return;
            }
            if (!plaintext) {
                showToast('请输入明文内容 📝', 'warning');
                inputText.focus();
                return;
            }

            try {
                const derivedKey = getDerivedKey(password);
                if (!derivedKey) {
                    showToast('密钥处理失败', 'error');
                    return;
                }

                const algorithm = algorithmSelect.value;
                const mode = modeSelect.value;
                const outputFormat = outputFormatSelect.value;
                const cipher = getCryptoJSCipher(algorithm);
                const cryptoMode = getCryptoJSMode(mode);
                const ivByteLength = getIVByteLength();
                const isECB = (mode === 'ECB');

                let iv = null;
                if (!isECB) {
                    iv = CryptoJS.lib.WordArray.random(ivByteLength);
                }

                // 加密参数
                const encryptParams = {
                    iv: iv,
                    mode: cryptoMode,
                    padding: CryptoJS.pad.Pkcs7,
                };

                const encrypted = cipher.encrypt(plaintext, derivedKey, encryptParams);

                let result;
                if (isECB) {
                    // ECB模式：直接输出密文
                    if (outputFormat === 'base64') {
                        result = encrypted.ciphertext.toString(CryptoJS.enc.Base64);
                    } else {
                        result = encrypted.ciphertext.toString(CryptoJS.enc.Hex);
                    }
                } else {
                    // 非ECB模式：IV + 密文
                    const ivAndCiphertext = iv.clone().concat(encrypted.ciphertext);
                    if (outputFormat === 'base64') {
                        result = ivAndCiphertext.toString(CryptoJS.enc.Base64);
                    } else {
                        result = ivAndCiphertext.toString(CryptoJS.enc.Hex);
                    }
                }

                outputText.value = result;
                // 动画反馈
                pulseElement(outputText);
                showToast('✅ 加密成功！', 'success');

                // 如果当前是解密模式，自动切换到加密模式显示结果
                // 保持当前模式不变，用户看到输出即可

            } catch (error) {
                console.error('加密失败:', error);
                showToast('❌ 加密失败，请检查输入', 'error');
            }
        }

        function performDecrypt() {
            const ciphertext = inputText.value;
            const password = keyInput.value;

            if (!password) {
                showToast('请输入密钥 🔑', 'warning');
                keyInput.focus();
                return;
            }
            if (!ciphertext) {
                showToast('请输入密文内容 📝', 'warning');
                inputText.focus();
                return;
            }

            try {
                const derivedKey = getDerivedKey(password);
                if (!derivedKey) {
                    showToast('密钥处理失败', 'error');
                    return;
                }

                const algorithm = algorithmSelect.value;
                const mode = modeSelect.value;
                const outputFormat = outputFormatSelect.value;
                const cipher = getCryptoJSCipher(algorithm);
                const cryptoMode = getCryptoJSMode(mode);
                const ivByteLength = getIVByteLength();
                const isECB = (mode === 'ECB');

                // 解码输入
                let rawData;
                try {
                    if (outputFormat === 'base64') {
                        rawData = CryptoJS.enc.Base64.parse(ciphertext);
                    } else {
                        rawData = CryptoJS.enc.Hex.parse(ciphertext);
                    }
                } catch (e) {
                    showToast('❌ 密文格式无效，请检查输出格式设置', 'error');
                    return;
                }

                if (!rawData || rawData.sigBytes === 0) {
                    showToast('❌ 密文为空或格式不正确', 'error');
                    return;
                }

                let iv = null;
                let actualCiphertext;

                if (isECB) {
                    // ECB模式：整个数据就是密文
                    actualCiphertext = rawData;
                } else {
                    // 非ECB模式：提取IV和密文
                    if (rawData.sigBytes < ivByteLength) {
                        showToast('❌ 密文太短，可能格式不正确或输出格式设置错误', 'error');
                        return;
                    }
                    // 分割IV和密文
                    const ivWords = [];
                    const ctWords = [];
                    const fullWords = rawData.words;
                    const ivWordCount = Math.ceil(ivByteLength / 4);
                    const totalFullWords = Math.ceil(rawData.sigBytes / 4);

                    for (let i = 0; i < ivWordCount; i++) {
                        ivWords.push(fullWords[i] || 0);
                    }
                    for (let i = ivWordCount; i < totalFullWords; i++) {
                        ctWords.push(fullWords[i] || 0);
                    }

                    iv = CryptoJS.lib.WordArray.create(ivWords, ivByteLength);
                    const ctByteLength = rawData.sigBytes - ivByteLength;
                    actualCiphertext = CryptoJS.lib.WordArray.create(ctWords, ctByteLength);
                }

                if (!isECB && (!iv || iv.sigBytes !== ivByteLength)) {
                    showToast('❌ 无法提取初始化向量(IV)', 'error');
                    return;
                }

                // 构造用于解密的ciphertext对象
                const cipherParams = CryptoJS.lib.CipherParams.create({
                    ciphertext: actualCiphertext,
                    iv: iv,
                });

                const decryptParams = {
                    iv: iv,
                    mode: cryptoMode,
                    padding: CryptoJS.pad.Pkcs7,
                };

                const decrypted = cipher.decrypt(cipherParams, derivedKey, decryptParams);
                const result = decrypted.toString(CryptoJS.enc.Utf8);

                if (!result || result.length === 0) {
                    // 可能是密钥错误
                    showToast('⚠️ 解密结果为空，可能密钥不正确或密文已损坏', 'warning');
                    outputText.value = '';
                } else if (containsMostlyGarbled(result)) {
                    showToast('⚠️ 解密结果可能不正确，请检查密钥和输出格式', 'warning');
                    outputText.value = result;
                } else {
                    outputText.value = result;
                    pulseElement(outputText);
                    showToast('✅ 解密成功！', 'success');
                }

            } catch (error) {
                console.error('解密失败:', error);
                showToast('❌ 解密失败，请检查密钥、密文和输出格式设置', 'error');
                outputText.value = '';
            }
        }

        function containsMostlyGarbled(str) {
            // 检查是否包含大量替换字符或控制字符
            let garbledCount = 0;
            const len = Math.min(str.length, 200);
            for (let i = 0; i < len; i++) {
                const code = str.charCodeAt(i);
                if (code === 0xFFFD || (code < 0x20 && code !== 0x0A && code !== 0x0D && code !== 0x09) || (code >=
                        0xD800 && code <= 0xDFFF)) {
                    garbledCount++;
                }
            }
            return garbledCount > len * 0.3;
        }

        function copyOutput() {
            const text = outputText.value;
            if (!text) {
                showToast('没有可复制的内容 📭', 'warning');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板 📋', 'success');
                // 短暂高亮输出框
                outputText.style.borderColor = '#10b981';
                outputText.style.boxShadow = '0 0 0 6px rgba(16,185,129,0.12)';
                setTimeout(() => {
                    outputText.style.borderColor = '';
                    outputText.style.boxShadow = '';
                }, 800);
            }).catch(() => {
                // 回退方案
                outputText.select();
                outputText.setSelectionRange(0, 99999);
                try {
                    document.execCommand('copy');
                    showToast('已复制到剪贴板 📋', 'success');
                } catch (e) {
                    showToast('复制失败，请手动选择复制', 'error');
                }
            });
        }

        function clearAll() {
            inputText.value = '';
            outputText.value = '';
            showToast('已清空 🧹', 'success');
            inputText.focus();
        }

        function swapIO() {
            const temp = inputText.value;
            inputText.value = outputText.value;
            outputText.value = temp;
            // 同时切换模式
            if (currentMode === 'encrypt') {
                setMode('decrypt');
            } else {
                setMode('encrypt');
            }
            showToast('已交换输入输出并切换模式 🔄', 'success');
            // 动画
            const arrowCircle = document.querySelector('.arrow-circle');
            if (arrowCircle) {
                arrowCircle.style.transform = 'rotate(180deg)';
                setTimeout(() => {
                    arrowCircle.style.transform = '';
                }, 400);
            }
        }

        function toggleKeyVisibility() {
            const isPassword = keyInput.type === 'password';
            keyInput.type = isPassword ? 'text' : 'password';
            btnToggleKey.textContent = isPassword ? '🙈' : '👁️';
            if (isPassword) {
                keyInput.focus();
                keyInput.select();
            }
        }

        function generateRandomKey() {
            const algorithm = algorithmSelect.value;
            let byteLength;
            if (algorithm === 'AES') {
                byteLength = parseInt(keySizeSelect.value) / 8;
            } else if (algorithm === 'TripleDES') {
                byteLength = 24;
            } else if (algorithm === 'DES') {
                byteLength = 8;
            } else {
                byteLength = 32;
            }
            const randomBytes = CryptoJS.lib.WordArray.random(byteLength);
            const hexKey = randomBytes.toString(CryptoJS.enc.Hex);
            keyInput.value = hexKey;
            keyInput.type = 'text';
            btnToggleKey.textContent = '🙈';
            updateKeyStrength();
            showToast('🎲 已生成随机密钥（' + (byteLength * 8) + '位）', 'success');
            // 短暂高亮密钥输入框
            keyInput.style.borderColor = '#10b981';
            keyInput.style.boxShadow = '0 0 0 4px rgba(16,185,129,0.1)';
            setTimeout(() => {
                keyInput.style.borderColor = '';
                keyInput.style.boxShadow = '';
            }, 1000);
        }

        function updateKeySizeOptions() {
            const algorithm = algorithmSelect.value;
            const keySizeSelectEl = keySizeSelect;
            const currentValue = keySizeSelectEl.value;

            // 清空选项
            keySizeSelectEl.innerHTML = '';

            if (algorithm === 'AES') {
                keySizeSelectEl.innerHTML = `
                    <option value="256">256 位</option>
                    <option value="192">192 位</option>
                    <option value="128">128 位</option>
                `;
                if (['256', '192', '128'].includes(currentValue)) {
                    keySizeSelectEl.value = currentValue;
                } else {
                    keySizeSelectEl.value = '256';
                }
            } else if (algorithm === 'TripleDES') {
                keySizeSelectEl.innerHTML = `
                    <option value="192">192 位 (有效168位)</option>
                `;
                keySizeSelectEl.value = '192';
            } else if (algorithm === 'DES') {
                keySizeSelectEl.innerHTML = `
                    <option value="64">64 位 (有效56位)</option>
                `;
                keySizeSelectEl.value = '64';
            }
        }

        function updateWarnings() {
            const mode = modeSelect.value;
            const algorithm = algorithmSelect.value;

            if (mode === 'ECB') {
                ecbWarning.style.display = 'block';
            } else {
                ecbWarning.style.display = 'none';
            }

            if (algorithm === 'DES') {
                desWarning.style.display = 'block';
            } else {
                desWarning.style.display = 'none';
            }
        }

        function updateKeyStrength() {
            const key = keyInput.value;
            const bar = keyStrengthBar;
            if (!key || key.length === 0) {
                bar.className = 'key-strength-bar';
                bar.style.width = '0%';
                return;
            }
            const length = key.length;
            let strengthClass = '';
            if (length < 6) {
                strengthClass = 'strength-weak';
            } else if (length < 12) {
                strengthClass = 'strength-medium';
            } else if (length < 20) {
                strengthClass = 'strength-strong';
            } else {
                strengthClass = 'strength-very-strong';
            }
            bar.className = 'key-strength-bar ' + strengthClass;
        }

        function pulseElement(el) {
            el.style.transition = 'all 0.15s ease';
            el.style.boxShadow = '0 0 0 8px rgba(16,185,129,0.15)';
            el.style.borderColor = '#10b981';
            setTimeout(() => {
                el.style.boxShadow = '';
                el.style.borderColor = '';
                setTimeout(() => {
                    el.style.transition = '';
                }, 300);
            }, 400);
        }

        function showToast(message, type) {
            if (toastTimer) {
                clearTimeout(toastTimer);
                toast.classList.remove('show', 'success', 'error', 'warning');
            }
            toast.textContent = message;
            toast.className = 'toast ' + (type || '');
            // 强制重排
            void toast.offsetWidth;
            toast.classList.add('show');
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
                toastTimer = null;
            }, 2200);
        }

        // ============ 初始设置 ============
        updateKeySizeOptions();
        updateWarnings();
        updateKeyStrength();

        console.log('🔐 SymCrypt 对称式加密工具已就绪');
        console.log('  - 支持算法: AES (128/192/256位), 3DES, DES');
        console.log('  - 支持模式: CBC, CTR, CFB, OFB, ECB');
        console.log('  - 输出格式: Base64, Hex');
        console.log('  - 快捷键: Ctrl+Enter 执行加密/解密');
        console.log('  - 双击输出框自动复制');
        console.log('  ℹ️ 所有数据仅在浏览器本地处理，不会上传到服务器');
    })();
</script>
</body>
</html>
